pgvector:
  - name: query1
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          country = 'China'
      ORDER BY
          (image_features <-> (SELECT image_features FROM my_table WHERE name = 'The Shawshank Redemption'))
      LIMIT 100;
  - name: query2
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          release_time >= '1996-01-01'
      ORDER BY
          (text_features <-> (SELECT text_features FROM my_table WHERE name = 'Toy Story'))
      LIMIT 100;
  - name: query3
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          release_time >= '2000-01-01' and country = 'China'
      ORDER BY
          (text_features <-> (SELECT text_features FROM my_table WHERE name = 'The Shawshank Redemption'))
      LIMIT 100;
  - name: query4
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          release_time >= '2000-01-01' and release_time < '2011-01-01' and 'Leonardo DiCaprio'=any(stars)
      ORDER BY
          (text_features <-> (SELECT text_features FROM my_table WHERE name = 'Titanic' and 'Leonardo DiCaprio'=any(stars)))
      LIMIT 100;
  - name: query5
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          intro like '%friendship%'
      ORDER BY
          (image_features <-> (SELECT image_features FROM my_table WHERE name = 'The Shawshank Redemption'))
      LIMIT 100;
  - name: query6
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          intro like '%boy%' and 'Tom Hanks'=any(stars)
      ORDER BY
          (text_features <-> (SELECT text_features FROM my_table WHERE name = 'Toy Story'))
      LIMIT 100;
  - name: query7
    query: >
      SET ivfflat.probes = 5;
      SELECT
          movieid
      FROM
          my_table
      WHERE
          intro like '%love%' and (release_time >= '1953-01-01' and release_time < '2000-01-01')
      ORDER BY
          (text_features <-> (SELECT text_features FROM my_table WHERE name = 'Roman Holiday'))
      LIMIT 100;
