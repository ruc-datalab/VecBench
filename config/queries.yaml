milvus:
  - name: query1
    query:
      data: 'The Shawshank Redemption'
      anns_field: 'image_features'
      param:
        metric_type: "L2"
        params:
          ef: 100
          nprobe: 1
      limit: 100
      expr: "country == 'China'"
      output_fields: ["movieid"]
  - name: query5
    query:
      data: 'Toy Story'
      anns_field: 'image_features'
      param:
        metric_type: "L2"
        params:
          ef: 100
          nprobe: 1
      limit: 100
      expr: 'intro like "%friendship%"'
      output_fields: ["movieid"]
  - name: query6
    query:
      data: 'The Shawshank Redemption'
      anns_field: 'text_features'
      param:
        metric_type: "L2"
        params:
          ef: 100
          nprobe: 1
      limit: 100
      expr: 'intro like "%toy%" and ARRAY_CONTAINS(stars, "Tom Hanks")'
      output_fields: ["movieid"]